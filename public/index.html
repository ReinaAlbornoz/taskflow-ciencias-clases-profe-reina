<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TaskFlow Ciencias - Pacientes</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #d81b60; } /* Color rosa como tus flores */
        table { border-collapse: collapse; width: 80%; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #d81b60; color: white; }
        .estado-estable { color: green; font-weight: bold; }
        .estado-critico { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🌸 Panel de Pacientes - Profe Reina</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Paciente</th>
                <th>Estado</th>
                <th>Especialidad</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>001</td>
                <td>Ana García</td>
                <td class="estado-estable">Estable</td>
                <td>Cardiología</td>
            </tr>
            <tr>
                <td>002</td>
                <td>Luis Pérez</td>
                <td class="estado-critico">Crítico</td>
                <td>Pediatría</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
